name: ROS2 Build & Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  ROS_DISTRO: humble

jobs:
  build-and-test:
    runs-on: ubuntu-22.04
    container:
      image: ros:humble-ros-base-jammy

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: src/rt_controller_framework

      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            ros-${ROS_DISTRO}-ros2-control \
            ros-${ROS_DISTRO}-controller-manager \
            ros-${ROS_DISTRO}-controller-interface \
            ros-${ROS_DISTRO}-hardware-interface \
            ros-${ROS_DISTRO}-realtime-tools \
            ros-${ROS_DISTRO}-pluginlib \
            python3-colcon-common-extensions \
            python3-rosdep
          rosdep update --rosdistro=${ROS_DISTRO}
          rosdep install --from-paths src --ignore-src -r -y

      - name: Build
        run: |
          source /opt/ros/${ROS_DISTRO}/setup.bash
          colcon build \
            --packages-select rt_controller_framework \
            --cmake-args -DCMAKE_BUILD_TYPE=Release -DCMAKE_CXX_FLAGS="-Werror" \
            --event-handlers console_direct+
        shell: bash

      - name: Test
        run: |
          source /opt/ros/${ROS_DISTRO}/setup.bash
          source install/setup.bash
          colcon test \
            --packages-select rt_controller_framework \
            --event-handlers console_direct+
          colcon test-result --verbose
        shell: bash

  lint:
    runs-on: ubuntu-22.04
    container:
      image: ros:humble-ros-base-jammy

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: src/rt_controller_framework

      - name: Install lint tools
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            ros-${ROS_DISTRO}-ament-cmake \
            ros-${ROS_DISTRO}-ament-lint-auto \
            ros-${ROS_DISTRO}-ament-lint-common \
            ros-${ROS_DISTRO}-ament-cmake-cpplint \
            ros-${ROS_DISTRO}-ament-cmake-cppcheck \
            python3-colcon-common-extensions

      - name: Build (for lint)
        run: |
          source /opt/ros/${ROS_DISTRO}/setup.bash
          colcon build \
            --packages-select rt_controller_framework \
            --cmake-args -DCMAKE_BUILD_TYPE=Debug
        shell: bash

      - name: Run linters
        run: |
          source /opt/ros/${ROS_DISTRO}/setup.bash
          source install/setup.bash
          colcon test \
            --packages-select rt_controller_framework \
            --ctest-args --output-on-failure -R "lint"
          colcon test-result --verbose
        shell: bash
